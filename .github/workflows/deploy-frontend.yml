name: Deploy Frontend to Cloud Storage

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload frontend files
        run: |
          gcloud storage cp --recursive frontend/* gs://${{ secrets.FRONTEND_BUCKET_NAME }}/

      - name: Set no-cache for JavaScript files
        run: |
          gcloud storage objects update gs://${{ secrets.FRONTEND_BUCKET_NAME }}/js/*.js \
            --cache-control="no-cache, max-age=0"