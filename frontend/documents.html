<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureDoc Cloud | Documents</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>


<body>

    <div class="dashboard-layout">

        <aside class="sidebar">

            <div class="logo">
                <div class="logo-mark">▣</div>
                <span>SecureDoc Cloud</span>
            </div>


            <nav>
                <a href="admin.html">Dashboard</a>
                <a class="active" href="documents.html">Documents</a>
                <a href="approvals.html">Approvals</a>
                <a href="notifications.html">Notifications</a>
                <a href="audit-logs.html">Audit Logs</a>
            </nav>


            <div class="user-box">
                <div class="avatar">AD</div>

                <div>
                    <strong>Admin User</strong>
                    <p>Administrator</p>
                </div>
            </div>

        </aside>



        <main class="dashboard-main">

            <header class="topbar">

                <div>
                    <h1>Documents</h1>
                    <p>Manage uploaded documents and review approval status.</p>
                </div>

                <button id="logoutButton">
                    Logout
                </button>

            </header>



            <section class="panel">

                <div class="panel-header">
                    <h2>All Documents</h2>
                </div>


                <input 
                    id="searchInput" 
                    class="search-input"
                    placeholder="Search by name, uploader, or status..."
                >


                <table>

                    <thead>

                        <tr>
                            <th>Document</th>
                            <th>Uploader</th>
                            <th>Status</th>
                            <th>Downloads</th>
                            <th>Action</th>
                        </tr>

                    </thead>


                    <tbody id="documentsTable"></tbody>


                </table>


            </section>


        </main>


    </div>



    <script src="js/api.js"></script>
    <script src="js/documents.js"></script>


</body>

</html>
